name: CI

# Hither CI — gates on the things that have historically broken this project:
#   1. Expo Go native-module version drift  -> `expo install --check`
#      (the recurring "works on my machine, crashes in Expo Go" bug; see CLAUDE.md rule 4)
#   2. TypeScript regressions                -> `tsc --noEmit`
#   3. Logic regressions                     -> jest (incl. nativeModuleVersions guard)
# expo-doctor runs as a non-blocking advisory (2 known structural warnings on this repo).
#
# No CD: the app is exercised through Expo Go (Metro serves the JS bundle directly),
# so there is no artifact to build/submit. Add EAS Build/Submit here when you move to
# Dev Builds or store releases.
#
# On failure on the default branch, the `open-issue` job files a deduped GitHub issue
# labelled `ci-failure` + `claude-fix`, which the claude-fix workflow picks up to open a
# fix PR automatically.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install
        run: npm ci

      - name: Test (jest)
        run: npm test --silent

      - name: Typecheck (tsc)
        run: npm run typecheck

      - name: Expo dependency check (version drift = Expo Go crashes)
        run: npx --yes expo install --check

      - name: Expo doctor (advisory)
        continue-on-error: true
        run: npx --yes expo-doctor

  # Turn a red build on the default branch into an actionable, deduped issue.
  open-issue:
    needs: verify
    if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.slice(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `CI failed on master @ ${sha}`;
            const body = [
              `CI failed on \`master\` at commit ${context.sha}.`,
              ``,
              `**Run:** ${runUrl}`,
              ``,
              `@claude The CI pipeline (\`.github/workflows/ci.yml\`) is red. Open the run above,`,
              `read the failing step's logs, find the root cause, and open a PR that fixes it.`,
              `Gates are: jest, tsc --noEmit, \`expo install --check\`. Keep the fix minimal.`,
            ].join("\n");
            // Dedupe: skip if an open ci-failure issue already exists for this sha.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "ci-failure", per_page: 50,
            });
            if (existing.data.some(i => i.title === title)) {
              core.info("Issue already open for this sha; skipping.");
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title, body, labels: ["ci-failure", "claude-fix"],
            });
