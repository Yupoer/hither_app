name: Regen iOS Pods (Hermes / SDK)

# macOS pod install so Podfile.lock matches package.json Hermes / RN.
# Trigger: workflow_dispatch only. Uploads Podfile.lock as artifact.

on:
  workflow_dispatch:

jobs:
  pod-install:
    runs-on: macos-15
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install JS deps
        run: npm ci --legacy-peer-deps

      - name: Confirm Hermes engine + SDK 56 floor
        run: |
          python3 - <<'PY'
          import json, pathlib
          pods = json.loads(pathlib.Path("ios/Podfile.properties.json").read_text())
          pkg = json.loads(pathlib.Path("package.json").read_text())
          assert pods.get("expo.jsEngine") == "hermes", pods
          assert pods.get("ios.deploymentTarget") == "16.4", pods
          rn = pkg["dependencies"]["react-native"]
          assert rn.startswith("0.85."), rn
          expo = pkg["dependencies"]["expo"]
          assert "56" in expo, expo
          print("engine hermes; RN", rn, "expo", expo)
          PY

      - name: CocoaPods install (fresh lock for RN/Hermes)
        run: |
          gem install cocoapods -N
          cd ios
          # Drop stale snapshot from prior RN so prebuilt pods can re-resolve.
          rm -f Podfile.lock
          rm -rf Pods
          pod install --repo-update
        env:
          COCOAPODS_DISABLE_STATS: "true"

      - name: Assert Hermes lock + verify:runtime
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          rn_pkg = json.loads(Path("node_modules/react-native/package.json").read_text())
          expected = rn_pkg.get("dependencies", {}).get("hermes-compiler") or rn_pkg["version"]
          lock = Path("ios/Podfile.lock").read_text(encoding="utf-8")
          assert not lock.startswith("\ufeff"), "BOM present"
          needle = f"hermes-engine ({expected})"
          assert needle in lock, f"missing {needle} in lock"
          print("ok", needle)
          PY
          node scripts/verify-runtime-alignment.mjs

      - name: Upload Podfile.lock
        uses: actions/upload-artifact@v4
        with:
          name: podfile-lock-sdk56-hermes
          path: apps/mobile/ios/Podfile.lock
          if-no-files-found: error
