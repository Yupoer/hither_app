name: Regen iOS Pods (JSC)

# One-shot macOS pod install so Podfile.lock matches expo.jsEngine=jsc.
# Trigger: workflow_dispatch only. Uploads Podfile.lock as artifact.

on:
  workflow_dispatch:

jobs:
  pod-install-jsc:
    runs-on: macos-15
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install JS deps
        run: npm ci

      - name: Confirm JSC engine config
        run: |
          python3 - <<'PY'
          import json, pathlib, sys
          pods = json.loads(pathlib.Path("ios/Podfile.properties.json").read_text())
          app = json.loads(pathlib.Path("app.json").read_text())["expo"]
          assert pods.get("expo.jsEngine") == "jsc", pods
          assert app.get("ios", {}).get("jsEngine") == "jsc", app.get("ios")
          print("engine config ok: jsc")
          PY

      - name: CocoaPods install (regenerate lock for JSC)
        run: |
          gem install cocoapods -N
          cd ios
          pod install --repo-update
        env:
          COCOAPODS_DISABLE_STATS: "true"

      - name: Assert no hermes-engine in lock
        run: |
          python3 - <<'PY'
          from pathlib import Path
          lock = Path("ios/Podfile.lock").read_text(encoding="utf-8")
          assert not lock.startswith("\ufeff"), "BOM present"
          assert "hermes-engine (" not in lock, "hermes-engine still locked"
          # Real JSC graph should drop hermes runtime pods
          for needle in ("React-RuntimeHermes", "React-hermes ("):
              if needle in lock:
                  print(f"warning: still contains {needle}")
          print("lock header:", lock.splitlines()[0])
          print("hermes-engine (:", lock.count("hermes-engine ("))
          print("React-RuntimeHermes count:", lock.count("React-RuntimeHermes"))
          print("runtime alignment check strings ok")
          PY
          node scripts/verify-runtime-alignment.mjs

      - name: Upload Podfile.lock
        uses: actions/upload-artifact@v4
        with:
          name: podfile-lock-jsc
          path: apps/mobile/ios/Podfile.lock
          if-no-files-found: error
