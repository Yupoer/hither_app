<!-- @dsCard group="Type" viewport="700x180" name="Display — Fredoka" subtitle="Chunky rounded display face for headings, brand & big numbers" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg-app);color:var(--text-primary);font-family:var(--font-display);padding:22px}
.xl{font-size:var(--text-display-lg);font-weight:700;letter-spacing:-.02em;line-height:1}
.md{font-size:var(--text-display-sm);font-weight:600;color:var(--text-secondary);margin-top:10px}
.metric{font-size:var(--text-metric-lg);font-weight:700;color:var(--accent);margin-top:10px}
.metric span{font-size:16px;color:var(--text-muted);font-weight:600}</style></head>
<body>
<div class="xl">往哪走、還差多遠</div>
<div class="md">Fredoka · Semibold 600</div>
<div class="metric">3 min <span>· 273 m</span></div>
</body></html>
