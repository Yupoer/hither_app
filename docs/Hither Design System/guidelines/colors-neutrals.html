<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals (ink scale)" subtitle="Cool-tinted dark surfaces & text, ink-900 → ink-100" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg-app);font-family:var(--font-ui);padding:20px}
.row{display:flex;gap:6px}
.sw{flex:1;height:88px;border-radius:10px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;border:1px solid var(--border-subtle)}
.n{font-size:10px;font-weight:700}</style></head>
<body><div class="row">
<div class="sw" style="background:var(--ink-900)"><span class="n" style="color:#888">900</span></div>
<div class="sw" style="background:var(--ink-800)"><span class="n" style="color:#888">800</span></div>
<div class="sw" style="background:var(--ink-700)"><span class="n" style="color:#999">700</span></div>
<div class="sw" style="background:var(--ink-600)"><span class="n" style="color:#aaa">600</span></div>
<div class="sw" style="background:var(--ink-500)"><span class="n" style="color:#ccc">500</span></div>
<div class="sw" style="background:var(--ink-400)"><span class="n" style="color:#111">400</span></div>
<div class="sw" style="background:var(--ink-300)"><span class="n" style="color:#111">300</span></div>
<div class="sw" style="background:var(--ink-100)"><span class="n" style="color:#111">100</span></div>
</div></body></html>
