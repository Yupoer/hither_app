<!-- @dsCard group="Spacing" viewport="700x160" name="Corner radii" subtitle="Generous friendly rounding · sm → 2xl → pill" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg-app);color:var(--text-primary);font-family:var(--font-ui);padding:22px}
.row{display:flex;gap:16px;align-items:center}
.b{width:96px;height:96px;background:var(--surface-card-elevated);border:1.5px solid var(--border-subtle);display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px}
.n{font-size:11px;color:var(--text-muted);font-weight:700}</style></head>
<body><div class="row">
<div class="b" style="border-radius:var(--radius-sm)"><span class="n">sm 12</span></div>
<div class="b" style="border-radius:var(--radius-md)"><span class="n">md 18</span></div>
<div class="b" style="border-radius:var(--radius-lg)"><span class="n">lg 24</span></div>
<div class="b" style="border-radius:var(--radius-xl)"><span class="n">xl 30</span></div>
<div class="b" style="border-radius:var(--radius-pill)"><span class="n">pill</span></div>
</div></body></html>
