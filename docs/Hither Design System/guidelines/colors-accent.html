<!-- @dsCard group="Colors" viewport="700x150" name="Theme accents" subtitle="Signal Orange (default) · Electric Sky · Grass — the swappable theme trio" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg-app);font-family:var(--font-ui);padding:20px}
.row{display:flex;gap:14px}
.sw{flex:1;height:96px;border-radius:var(--radius-lg);display:flex;flex-direction:column;justify-content:flex-end;padding:12px;box-shadow:var(--shadow-card)}
.n{font-family:var(--font-display);font-weight:700;font-size:15px;color:#000}
.h{font-size:12px;color:rgba(0,0,0,.55);font-weight:600}</style></head>
<body><div class="row">
<div class="sw" style="background:var(--signal-500)"><div class="n">Signal Orange</div><div class="h">#FF6B35 · --accent</div></div>
<div class="sw" style="background:var(--sky-500)"><div class="n">Electric Sky</div><div class="h">#37B6FF · --nav</div></div>
<div class="sw" style="background:var(--grass-500)"><div class="n">Grass</div><div class="h">#4ADE80 · --success</div></div>
</div></body></html>
