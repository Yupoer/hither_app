<!-- @dsCard group="Components" viewport="700x300" name="Forms — Input, Switch, Segmented" subtitle="Search input, toggle, and the Leader / Follower segmented control" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;background:var(--bg-app);color:var(--text-primary);font-family:var(--font-ui);padding:22px}
.lab{font-size:11px;color:var(--text-muted);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin:0 0 8px}
.blk{margin-bottom:18px;max-width:420px}
.row{display:flex;align-items:center;gap:16px}</style></head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Input, Switch, Segmented } = window.HitherDesignSystem_fea0fc;
function Demo(){
  const [q,setQ]=React.useState('');
  const [solo,setSolo]=React.useState(false);
  const [role,setRole]=React.useState('leader');
  return (<>
    <div className="blk"><div className="lab">Input</div>
      <Input iconLeft="🔍" placeholder="搜尋地點" value={q} onChange={e=>setQ(e.target.value)} /></div>
    <div className="blk"><div className="lab">Switch — 獨自行動</div>
      <div className="row"><Switch checked={solo} onChange={setSolo}/><span style={{color:'var(--text-secondary)',fontWeight:600}}>{solo?'開':'關'}</span></div></div>
    <div className="blk"><div className="lab">Segmented — 角色</div>
      <Segmented options={[{label:'隊長',value:'leader'},{label:'隊員',value:'follower'}]} value={role} onChange={setRole}/></div>
  </>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
